server:
  port: 9000

spring:
  application:
    name: rubbish-gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
      config:
        enabled: false
    sentinel:
      enabled: true
      eager: true
      transport:
        dashboard: 127.0.0.1:8858
        port: 8719
      datasource:
        flow:
          nacos:
            server-addr: 127.0.0.1:8848
            data-id: ${spring.application.name}-flow-rules
            group-id: SENTINEL_GROUP
            rule-type: flow
        degrade:
          nacos:
            server-addr: 127.0.0.1:8848
            data-id: ${spring.application.name}-degrade-rules
            group-id: SENTINEL_GROUP
            rule-type: degrade
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 认证服务
        - id: rubbish-auth
          uri: lb://rubbish-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=2

        # 用户服务
        - id: rubbish-user
          uri: lb://rubbish-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"

        # 订单服务
        - id: rubbish-order
          uri: lb://rubbish-order
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=2

      # 全局CORS配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  # Redis配置
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 2000ms

# JWT配置
jwt:
  secret: rubbish-secret-key-2024
  expiration: 86400

# 白名单路径
gateway:
  white-list:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/captcha

# 日志配置
logging:
  level:
    com.example.rubbish: debug
    org.springframework.cloud.gateway: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
