server:
  port: 8003

# Swagger配置
springfox:
  documentation:
    enabled: false
    swagger-ui:
      enabled: false

spring:
  application:
    name: rubbish-auth
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
      config:
        enabled: false
    sentinel:
      enabled: true
      eager: true
      transport:
        dashboard: 127.0.0.1:8858
        port: 8721

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rubbish_user?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 1111
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20

  redis:
    host: 127.0.0.1
    port: 6379
    database: 2
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

# JWT配置
jwt:
  secret: rubbish-secret-key-2024
  expiration: 86400

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.rubbish.auth.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

feign:
  sentinel:
    enabled: true

logging:
  level:
    com.example.rubbish: debug

management:
  endpoints:
    web:
      exposure:
        include: "*"
